name: Live Fight Stats

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          EVENT_URL: ${{ secrets.EVENT_URL }}
          EVENT_ID: ${{ secrets.EVENT_ID }}
        run: python main.py

      - name: Debug git state before commit
        run: |
          echo "Текущая ветка: $(git branch --show-current)"
          git status
          ls -l current_index.txt fight_ids.json live_message_id.txt 2>/dev/null || echo "Файлов нет"

      - name: Commit and push state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git status
          if git diff --cached --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "Update state" && git push origin HEAD:main
          fi
